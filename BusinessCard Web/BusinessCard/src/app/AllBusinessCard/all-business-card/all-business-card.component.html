<div class="container">
  <div class="table-responsive">
    <table id="example" class="table table-bordered table-hover table-striped" width="100%">
      <thead>
        <tr>
          <th>Name</th>
          <th>DOB</th>
          <th>Gender</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Address</th>
          <th>Action</th>
        </tr>
      </thead>
      <tfoot>
        <tr>
          <th>
            <input type="text" placeholder="Search Name" [(ngModel)]="searchText" (input)="filterTable()" />
          </th>
          <th>
            <div class="dropdown-container d-flex">
              <select [(ngModel)]="selectedYear" (change)="onYearChange()" class="me-2">
                <option value="">Year</option>
                <option *ngFor="let year of years" [value]="year">{{ year }}</option>
              </select>
              <select *ngIf="selectedYear" [(ngModel)]="selectedMonth" (change)="onMonthChange()" class="me-2">
                <option value="">Month</option>
                <option *ngFor="let month of months" [value]="month.value">{{ month.name }}</option>
              </select>
              <select *ngIf="selectedMonth" [(ngModel)]="selectedDay" (change)="filterTable()">
                <option value="">Day</option>
                <option *ngFor="let day of days" [value]="day">{{ day }}</option>
              </select>
            </div>
          </th>
          <th>
            <select [(ngModel)]="genderFilter" (change)="filterTable()">
              <option value="">All</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </th>
          <th>
            <input type="text" placeholder="Search Email" [(ngModel)]="emailFilter" (input)="filterTable()" />
          </th>
          <th>
            <input type="text" placeholder="Search Phone" [(ngModel)]="phoneFilter" (input)="filterTable()" />
          </th>
          <th>
            <input type="text" placeholder="Search Address" [(ngModel)]="addressFilter" (input)="filterTable()" />
          </th>
        </tr>
      </tfoot>
      <tbody>
       <!-- <tr *ngFor="let item of dataBusinessCard">
          <td>{{ item.name }}</td>
          <td>{{ item.dob }}</td>
          <td>{{ item.gender }}</td>
          <td>{{ item.email }}</td>
          <td>{{ item.phone }}</td>
          <td>{{ item.address }}</td>
          <td>
            <button (click)="deleteItem(item)">Delete</button>
            <button (click)="exportItem(item)">Export</button>
          </td>
        </tr>-->
      </tbody>
    </table>
  </div>
</div>
<app-delete-business-card [ModalBusinessCardData]="deletedatabusinesscard" [modal]="_modaldelete" [datatable]="dataTable"></app-delete-business-card>
<app-export-business-card [ModalBusinessCardData]="deletedatabusinesscard" [modal]="_modalexport"></app-export-business-card>
